{{- /* schema.html — JSON-LD 結構化資料 */ -}}

{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.Title | jsonify }},
  "url": {{ site.BaseURL | jsonify }},
  "description": {{ site.Params.description | jsonify }},
  "inLanguage": "zh-TW"
}
</script>

{{ else if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "url": {{ .Permalink | jsonify }},
  "description": {{ with .Params.description }}{{ . | jsonify }}{{ else }}{{ site.Params.description | jsonify }}{{ end }},
  "inLanguage": "zh-TW",
  "datePublished": {{ if not .Date.IsZero }}{{ .Date.Format "2006-01-02" | jsonify }}{{ else }}"" {{ end }},
  "dateModified": {{ if not .Lastmod.IsZero }}{{ .Lastmod.Format "2006-01-02" | jsonify }}{{ else if not .Date.IsZero }}{{ .Date.Format "2006-01-02" | jsonify }}{{ else }}""{{ end }},
  "author": {
    "@type": "Person",
    "name": "時光存摺"
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.Title | jsonify }},
    "url": {{ site.BaseURL | jsonify }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
}
</script>
{{ end }}
