<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E120A"/>
      <stop offset="100%" stop-color="#3A2810"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A5C14"/>
      <stop offset="100%" stop-color="#A8832A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Notebook lines texture -->
  <line x1="0" y1="110" x2="1200" y2="110" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="190" x2="1200" y2="190" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="230" x2="1200" y2="230" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="270" x2="1200" y2="270" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="310" x2="1200" y2="310" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="350" x2="1200" y2="350" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="390" x2="1200" y2="390" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="470" x2="1200" y2="470" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="510" x2="1200" y2="510" stroke="#2C1C0E" stroke-width="1" opacity="0.6"/>
  <!-- Left margin red line -->
  <line x1="120" y1="0" x2="120" y2="630" stroke="#5A1010" stroke-width="2" opacity="0.5"/>
  <!-- Category label -->
  <rect x="140" y="80" width="120" height="28" rx="4" fill="#7A5C14" opacity="0.8"/>
  <text x="200" y="99" text-anchor="middle" font-size="13" fill="#EDE8D8" font-family="sans-serif">省錢優化</text>
  <!-- Main title -->
  <text x="140" y="200" font-size="64" font-weight="700" fill="#EDE8D8" font-family="sans-serif">訂閱費大掃除</text>
  <text x="140" y="280" font-size="38" fill="#A8832A" font-family="sans-serif">一張清單砍掉你沒在用的 APP</text>
  <!-- Divider -->
  <rect x="140" y="320" width="200" height="3" rx="1" fill="url(#accent)"/>
  <!-- Key stat -->
  <text x="140" y="390" font-size="28" fill="#C9A84C" font-family="sans-serif">58 分鐘清查</text>
  <text x="360" y="390" font-size="28" fill="#6B5A3E" font-family="sans-serif">  ·  一年省下</text>
  <text x="580" y="390" font-size="42" font-weight="700" fill="#A8832A" font-family="sans-serif">NT$9,696</text>
  <!-- Time badge -->
  <rect x="140" y="490" width="180" height="44" rx="22" fill="none" stroke="#7A5C14" stroke-width="2"/>
  <text x="230" y="518" text-anchor="middle" font-size="16" fill="#A8832A" font-family="sans-serif">⏱ 0 min / 設定一次</text>
  <!-- Site brand -->
  <text x="1060" y="590" text-anchor="middle" font-size="16" fill="#6B5A3E" font-family="sans-serif">時光存摺</text>
</svg>
